services:
  Homybudget:
    image: homynudget/homybudget:latest
    container_name: homybudget
    restart: unless-stopped
    ports:
      - "8787:80"
    volumes:
      - uploads-data:/app/server/uploads
    environment:
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8787}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      PASSWORD_MIN_LENGTH: 8
      PASSWORD_RESET_TOKEN_TTL_MINUTES: 60
      PGHOST: db
      PGPORT: 5432
      PGUSER: ${PGUSER:-homybudget}
      PGPASSWORD: ${PGPASSWORD:-change_me_db_password}
      PGDATABASE: ${PGDATABASE:-homybudget}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: homybudget-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER:-homybudget}
      POSTGRES_PASSWORD: ${PGPASSWORD:-change_me_db_password}
      POSTGRES_DB: ${PGDATABASE:-homybudget}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homybudget -d homybudget"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db-data:
  uploads-data:
